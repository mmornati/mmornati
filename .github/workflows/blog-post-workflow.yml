name: Latest blog post workflow
on:
  schedule: # Runs every 12 hours to avoid rate limiting
    - cron: '0 */12 * * *'
  workflow_dispatch: # Allows you to run it manually

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Pull in blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://blog.mornati.net/rss.xml"
          template: "- [$title]($url) — $description$newline"
          title_max_length: "120"
          description_max_length: "200"
          disable_html_encoding: "true"
          tag_post_pre_newline: "true"
          item_exec: "post.description = (post.description || '').replace(/<[^>]*>/g, ' ').replace(/\\s+/g, ' ').trim();"
