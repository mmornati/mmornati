name: Generate GitHub Metrics

on:
  schedule:
    - cron: "0 5 * * *" # Daily at 05:00 UTC (07:00 Paris)
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
      pull-requests: read
    steps:
      - uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          
          # Output configuration - commit directly to repo
          filename: github-metrics.svg
          output_action: commit
          committer_branch: output
          committer_message: "chore: update metrics"
          config_timezone: Europe/Paris
          
          # Base content (activity graph removed — the 3D contribution
          # graph in profile-3d-contrib is the dedicated activity visual)
          base: header, community, repositories
          base_indepth: yes
          
          # Repositories traffic (requires METRICS_TOKEN - must be a CLASSIC PAT
          # with 'repo' scope; fine-grained PATs aren't supported for the
          # GraphQL API used by the metrics action)
          plugin_traffic: yes
          
          # Lines of code changed
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4
          plugin_lines_sections: base
          # The lines plugin occasionally crashes when GitHub's stats API returns a
          # ghost contributor (author: null) — lowlighter/metrics@3.34 logs
          # `contributor.author.login` without optional chaining. The delay option
          # performs a second query if the first one returns empty/zeroed values.
          plugin_lines_delay: 5
          # Make plugin errors non-fatal so a single buggy plugin doesn't fail the
          # whole workflow run. The SVG is still generated; the failing plugin
          # section will simply be empty/missing.
          plugins_errors_fatal: no
          # Gracefully exit if the API quota is too low (avoids partial renders
          # and noisy failures when the rate limit is hit by sibling workflows).
          quota_required_graphql: 1000
          quota_required_rest: 1000
          
          # Most used languages
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, less, dockerfile, makefile, shell
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_indepth: yes
          
          # Coding habits and activity
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_trim: yes

          # Isometric commit calendar disabled — the 3D contribution
          # graph in profile-3d-contrib is the dedicated activity visual
          
          # Theme configuration
          config_display: large
          config_output: svg

